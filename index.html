<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stormhammer Security | Citrus Heights CA Patrol Services</title>
    <meta name="description" content="Professional security patrol services in Citrus Heights, CA. Licensed PPO #121830. 24/7 marked vehicle patrols for apartments, retail, and industrial sites. Call 530-902-9390.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; }
        .bg-tactical-gradient { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuration
        const PHONE = "530-902-9390";
        const PHONE_HREF = "tel:+15309029390";
        const PPO = "PPO #121830";
        const EMAIL = "sales@stormhammersecurity.com";

        const App = () => {
            useEffect(() => {
                // Initialize Lucide icons after React renders
                lucide.createIcons();
            }, []);

            const services = [
                { icon: "building-2", img: "IMG_0418.png", title: "Apartment Patrol", desc: "Nightly drive-throughs and foot patrols of breezeways." },
                { icon: "store", img: "IMG_0417.png", title: "Shopping Centers", desc: "Visible deterrent patrols and loitering control." },
                { icon: "warehouse", img: "IMG_0415.png", title: "Industrial & Warehouse", desc: "Perimeter checks and dock-door inspections." },
                { icon: "hard-hat", img: "IMG_0416.png", title: "Construction Sites", desc: "Theft, vandalism and copper-loss prevention." },
                { icon: "parking-circle", img: "IMG_0414.png", title: "Parking Lots", desc: "Marked-vehicle sweeps and reporting." },
                { icon: "shield-check", img: "IMG_0413.png", title: "Office & HOA", desc: "Scheduled checks for business campuses." },
            ];

            const gallery = [
                "IMG_0410.png", "IMG_0412.png", "IMG_0411.png", "IMG_0407.png", 
                "IMG_0409.png", "IMG_0408.png", "IMG_0406.png", "IMG_0405.jpeg"
            ];

            return (
                <div className="min-h-screen text-slate-50">
                    {/* Header */}
                    <header className="sticky top-0 z-50 backdrop-blur-md bg-black/70 border-b border-white/10">
                        <div className="container mx-auto flex items-center justify-between py-4 px-6">
                            <div className="flex items-center gap-2 font-bold text-lg">
                                <i data-lucide="shield" className="w-6 h-6 text-blue-500"></i>
                                <span>Stormhammer<span className="text-blue-500">.</span></span>
                            </div>
                            <a href={PHONE_HREF} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-bold transition">
                                {PHONE}
                            </a>
                        </div>
                    </header>

                    {/* Hero */}
                    <section className="relative h-[80vh] flex items-center justify-center overflow-hidden">
                        <img src="IMG_0422.png" className="absolute inset-0 w-full h-full object-cover opacity-40" alt="Stormhammer Patrol" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent" />
                        <div className="relative z-10 text-center px-6">
                            <h1 className="text-6xl md:text-8xl font-black tracking-tighter mb-4 italic uppercase">STORMHAMMER</h1>
                            <p className="text-xl md:text-2xl text-blue-400 font-mono tracking-widest uppercase mb-8">Citrus Heights Elite Security</p>
                            <a href={PHONE_HREF} className="inline-block bg-blue-600 hover:bg-blue-700 text-white text-lg px-10 py-4 rounded-lg font-black transition-transform hover:scale-105">
                                CALL DISPATCH NOW
                            </a>
                        </div>
                    </section>

                    {/* Service Grid */}
                    <section className="py-24 px-6 container mx-auto">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl md:text-5xl font-bold mb-4 uppercase">Property Specialists</h2>
                            <div className="h-1 w-20 bg-blue-600 mx-auto"></div>
                        </div>
                        <div className="grid md:grid-cols-3 gap-8">
                            {services.map((s, idx) => (
                                <div key={idx} className="group bg-neutral-900 rounded-2xl overflow-hidden border border-white/5 hover:border-blue-500/50 transition-all">
                                    <div className="h-56 overflow-hidden">
                                        <img src={s.img} alt={s.title} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" />
                                    </div>
                                    <div className="p-8">
                                        <i data-lucide={s.icon} className="w-8 h-8 text-blue-500 mb-4"></i>
                                        <h3 className="text-xl font-bold mb-2">{s.title}</h3>
                                        <p className="text-slate-400 text-sm">{s.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Gallery Section */}
                    <section className="py-20 bg-black/50">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-12">
                                <p className="text-blue-500 font-mono text-xs uppercase tracking-[0.3em] mb-2">Fleet & Equipment</p>
                                <h2 className="text-4xl font-bold">On the Ground</h2>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {gallery.map((img, idx) => (
                                    <div key={idx} className="aspect-square rounded-lg overflow-hidden border border-white/10 grayscale hover:grayscale-0 transition-all duration-500">
                                        <img src={img} className="w-full h-full object-cover" alt="Patrol Detail" />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* CTA Section */}
                    <section className="py-24 bg-blue-600">
                        <div className="container mx-auto px-6 text-center">
                            <h2 className="text-4xl md:text-6xl font-black mb-6 uppercase tracking-tight">Protect Your Asset Today</h2>
                            <p className="text-xl mb-10 opacity-90">Most Citrus Heights properties onboarded within 48 hours.</p>
                            <div className="flex flex-col md:flex-row justify-center gap-4">
                                <a href={PHONE_HREF} className="bg-black text-white px-10 py-4 rounded-md font-bold text-xl hover:bg-neutral-900 transition">{PHONE}</a>
                                <a href={`mailto:${EMAIL}`} className="bg-white text-blue-600 px-10 py-4 rounded-md font-bold text-xl hover:bg-slate-100 transition">Email Quote Request</a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-12 border-t border-white/5 bg-black">
                        <div className="container mx-auto px-6 text-center">
                            <i data-lucide="shield" className="w-8 h-8 text-blue-600 mx-auto mb-4"></i>
                            <p className="text-slate-500 text-sm mb-2">© 2026 Stormhammer Security, Inc.</p>
                            <p className="text-blue-600 font-mono text-xs font-bold tracking-widest">{PPO} · CITRUS HEIGHTS, CA</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
