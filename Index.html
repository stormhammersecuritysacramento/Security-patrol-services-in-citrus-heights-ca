<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stormhammer Security | Citrus Heights Patrol</title>
    <meta name="description" content="Professional security patrol services in Citrus Heights, CA. Licensed PPO #121830. 24/7 marked vehicle patrols. Call 530-902-9390.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        .mobile-height { min-height: calc(100vh - 72px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect } = React;

        const PHONE = "530-902-9390";
        const PHONE_HREF = "tel:+15309029390";
        const PPO = "PPO #121830";
        const EMAIL = "sales@stormhammersecurity.com";

        const App = () => {
            useEffect(() => {
                lucide.createIcons();
            }, []);

            const services = [
                { img: "IMG_0418.png", title: "Apartments" },
                { img: "IMG_0417.png", title: "Retail" },
                { img: "IMG_0415.png", title: "Industrial" },
                { img: "IMG_0416.png", title: "Construction" },
                { img: "IMG_0414.png", title: "Parking Lots" },
                { img: "IMG_0413.png", title: "Office/HOA" },
            ];

            const gallery = [
                "IMG_0422.png", "IMG_0410.png", "IMG_0412.png", "IMG_0411.png", 
                "IMG_0407.png", "IMG_0409.png", "IMG_0408.png", "IMG_0405.jpeg"
            ];

            return (
                <div className="text-slate-50">
                    {/* Header */}
                    <header className="bg-black border-b border-white/10 sticky top-0 z-50">
                        <div className="container mx-auto flex justify-center py-4 px-6">
                            <div className="flex items-center gap-2 font-bold text-xl uppercase tracking-tighter">
                                <i data-lucide="shield" className="w-6 h-6 text-blue-500"></i>
                                <span>Stormhammer<span className="text-blue-500">.</span></span>
                            </div>
                        </div>
                    </header>

                    {/* Hero Section - Optimized for Mobile Center */}
                    <section className="mobile-height flex flex-col items-center justify-center text-center px-6 py-12">
                        <div className="inline-flex items-center gap-2 rounded-full bg-blue-500/10 border border-blue-500/20 px-4 py-1 mb-8">
                            <span className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                            <span className="text-xs font-mono text-blue-400 uppercase tracking-widest font-bold">Live in Citrus Heights</span>
                        </div>
                        
                        <h1 className="text-5xl md:text-7xl font-black mb-6 leading-[0.9] tracking-tighter italic uppercase">
                            PATROL <br/> <span className="text-blue-600">SERVICES</span>
                        </h1>
                        
                        <p className="text-slate-400 text-lg mb-10 max-w-sm mx-auto leading-relaxed">
                            Professional 24/7 security for apartments, retail, and construction sites. GPS-verified.
                        </p>

                        <div className="w-full max-w-xs space-y-4">
                            <a href={PHONE_HREF} className="flex items-center justify-center gap-3 bg-blue-600 hover:bg-blue-700 text-white w-full py-5 rounded-xl font-black text-xl shadow-lg shadow-blue-900/20 transition-transform active:scale-95">
                                <i data-lucide="phone" className="w-6 h-6"></i>
                                {PHONE}
                            </a>
                            <a href={`mailto:${EMAIL}`} className="flex items-center justify-center bg-white/5 hover:bg-white/10 border border-white/10 text-white w-full py-4 rounded-xl font-bold transition-all">
                                Email Quote Request
                            </a>
                        </div>
                        
                        <p className="mt-8 text-[10px] text-slate-600 uppercase tracking-[0.3em] font-bold">{PPO}</p>
                    </section>

                    {/* Quick Services - Small Horizontal Scroll or Tight Grid */}
                    <section className="py-12 bg-neutral-900/30">
                        <div className="container mx-auto px-6">
                            <h2 className="text-center text-sm font-mono text-blue-500 uppercase tracking-widest mb-8">Property Expertise</h2>
                            <div className="grid grid-cols-2 gap-3">
                                {services.map((s, idx) => (
                                    <div key={idx} className="relative aspect-video rounded-lg overflow-hidden border border-white/5 shadow-2xl">
                                        <img src={s.img} className="w-full h-full object-cover opacity-60" alt={s.title} />
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <span className="text-[10px] font-black uppercase tracking-widest bg-black/80 px-2 py-1 rounded">{s.title}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Compact Gallery */}
                    <section className="py-12 border-t border-white/5">
                        <div className="container mx-auto px-4">
                            <div className="grid grid-cols-4 gap-1">
                                {gallery.map((img, idx) => (
                                    <div key={idx} className="aspect-square bg-neutral-900">
                                        <img src={img} className="w-full h-full object-cover grayscale opacity-80" alt="Fleet" />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-12 text-center border-t border-white/5">
                        <i data-lucide="shield" className="w-6 h-6 text-blue-900 mx-auto mb-4"></i>
                        <p className="text-[10px] text-slate-600 uppercase tracking-widest">
                            © 2026 Stormhammer Security, Inc. <br/> Licensed California PPO #121830
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
